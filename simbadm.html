<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimbaDM — Кинематограф в каждом кадре</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --night: #040f0f;
  --deep: #071413;
  --surface: #0c1e1c;
  --surface-light: #122b28;
  --surface-hover: #16332f;
  --glass: rgba(12, 30, 28, 0.92);
  --sand: #d4a574;
  --sand-light: #e8c39e;
  --sand-dim: rgba(212, 165, 116, 0.12);
  --sand-dim-hover: rgba(212, 165, 116, 0.2);
  --mint: #5a9e8c;
  --mint-glow: rgba(90, 158, 140, 0.25);
  --text: #f0ece4;
  --text-dim: #9e9a8e;
  --text-faint: #5c5952;
  --radius: 28px;
  --radius-sm: 16px;
  --radius-asym: 28px 6px 28px 6px;
  --shadow: 0 8px 32px rgba(0,0,0,0.45);
  --shadow-gold: 0 4px 24px rgba(212, 165, 116, 0.18);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--night);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.ambient {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(90,158,140,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 70%, rgba(212,165,116,0.05) 0%, transparent 50%);
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--night); }
::-webkit-scrollbar-thumb { background: var(--surface-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--sand); }
h1, h2, h3, .brand { font-family: 'Playfair Display', serif; }
.app { position: relative; z-index: 1; max-width: 1440px; margin: 0 auto; padding: 0 32px; }
@media(max-width:768px){ .app { padding: 0 16px; } }

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  backdrop-filter: blur(24px) saturate(1.3);
  background: linear-gradient(180deg, rgba(4,15,15,0.95) 0%, rgba(4,15,15,0.7) 100%);
  border-bottom: 1px solid rgba(212,165,116,0.08);
}
.header-inner {
  max-width: 1440px; margin: 0 auto; padding: 0 32px;
  height: 76px; display: flex; align-items: center; justify-content: space-between;
}
.brand {
  display: flex; align-items: center; gap: 14px; cursor: pointer; text-decoration: none;
}
.brand-mark {
  width: 44px; height: 44px; border-radius: var(--radius-asym);
  background: linear-gradient(135deg, var(--sand) 0%, #b88a5a 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-gold); transition: transform 0.4s var(--ease);
}
.brand:hover .brand-mark { transform: rotate(-6deg) scale(1.08); }
.brand-mark svg { width: 22px; height: 22px; }
.brand-text { display: flex; flex-direction: column; }
.brand-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; line-height: 1; }
.brand-sub { font-size: 10px; color: var(--text-faint); font-family: 'Inter',sans-serif; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; font-weight: 500; }

.nav { display: flex; align-items: center; gap: 6px; background: var(--surface); padding: 6px; border-radius: 100px; border: 1px solid rgba(212,165,116,0.1); }
.nav-btn {
  position: relative; padding: 10px 20px; border-radius: 100px; border: none; background: transparent;
  color: var(--text-dim); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
  transition: all 0.3s var(--ease); display: flex; align-items: center; gap: 8px;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--night); background: linear-gradient(135deg, var(--sand), #c49360); box-shadow: var(--shadow-gold); font-weight: 600; }
.nav-btn svg { width: 16px; height: 16px; }

.actions { display: flex; align-items: center; gap: 14px; }
.search-wrap { position: relative; }
.search-wrap input {
  background: var(--surface); border: 1px solid rgba(212,165,116,0.15);
  border-radius: 100px; padding: 10px 14px 10px 38px; color: var(--text);
  font-size: 13px; width: 220px; outline: none; transition: all 0.3s var(--ease); font-family: inherit;
}
.search-wrap input:focus { width: 320px; border-color: var(--sand); background: var(--surface-light); box-shadow: 0 0 0 4px var(--sand-dim); }
.search-wrap input::placeholder { color: var(--text-faint); }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-faint); pointer-events: none; }

.btn {
  padding: 10px 22px; border-radius: 100px; border: none; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.3s var(--ease); font-family: inherit; display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
}
.btn-gold { background: linear-gradient(135deg, var(--sand) 0%, #c49360 100%); color: var(--night); box-shadow: var(--shadow-gold); }
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,165,116,0.3); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid rgba(212,165,116,0.15); }
.btn-ghost:hover { border-color: var(--sand); color: var(--sand); background: var(--sand-dim); }

.avatar {
  width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--mint), #3d7a6b);
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; cursor: pointer;
  border: 2px solid rgba(90,158,140,0.3); transition: all 0.3s var(--ease); color: var(--night);
  overflow: hidden; position: relative;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar:hover { transform: scale(1.1); border-color: var(--mint); box-shadow: 0 0 20px var(--mint-glow); }

.main { padding-top: 76px; }
.section { padding: 48px 0; }

.hero { position: relative; padding: 80px 0 60px; overflow: hidden; }
.hero-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: center; }
.hero-label {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--sand-dim); border: 1px solid rgba(212,165,116,0.18);
  padding: 8px 18px; border-radius: 100px; font-size: 12px; font-weight: 600;
  color: var(--sand); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 28px;
}
.hero-label svg { width: 14px; height: 14px; }
.hero h1 { font-size: clamp(36px, 5vw, 64px); font-weight: 700; line-height: 1.1; margin-bottom: 20px; letter-spacing: -1px; }
.hero h1 em { color: var(--sand); font-style: normal; }
.hero p { font-size: 16px; color: var(--text-dim); line-height: 1.7; max-width: 480px; margin-bottom: 32px; }
.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }
.hero-stats { display: flex; gap: 40px; margin-top: 48px; }
.hero-stat h4 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--sand); font-weight: 700; }
.hero-stat span { font-size: 12px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
.card {
  background: var(--surface); border-radius: var(--radius-asym); overflow: hidden;
  cursor: pointer; transition: all 0.4s var(--ease); border: 1px solid rgba(212,165,116,0.06);
  position: relative; display: flex; flex-direction: column;
}
.card:hover {
  transform: translateY(-8px) rotate(0.5deg);
  box-shadow: var(--shadow), 0 0 30px rgba(212,165,116,0.08);
  border-color: rgba(212,165,116,0.2);
}
.card-img { position: relative; aspect-ratio: 2/3; overflow: hidden; background: var(--deep); flex-shrink: 0; }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s var(--ease); }
.card:hover .card-img img { transform: scale(1.1); }
.card-body { padding: 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.card-title { font-size: 15px; font-weight: 600; line-height: 1.3; word-break: break-word; color: var(--text); }
.card-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-faint); flex-wrap: wrap; }
.card-meta span { display: flex; align-items: center; gap: 3px; }
.card-meta svg { width: 13px; height: 13px; }

.modal-bg {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(4, 15, 15, 0.88);
  backdrop-filter: blur(16px) saturate(1.2);
  display: none; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; transition: opacity 0.35s var(--ease);
}
.modal-bg.show { display: flex; opacity: 1; }
.modal-box {
  background: linear-gradient(145deg, var(--surface) 0%, var(--deep) 100%);
  border-radius: var(--radius); border: 1px solid rgba(212,165,116,0.15);
  max-width: 460px; width: 100%; padding: 0;
  box-shadow: var(--shadow-lg), 0 0 60px rgba(212,165,116,0.08);
  transform: translateY(30px) scale(0.96); transition: all 0.4s var(--ease);
  overflow: hidden;
}
.modal-bg.show .modal-box { transform: translateY(0) scale(1); }
.modal-header {
  padding: 32px 32px 0; display: flex; justify-content: space-between; align-items: flex-start;
}
.modal-header h3 { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.2; }
.modal-header p { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
.modal-close {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(212,165,116,0.15);
  background: var(--surface-light); color: var(--text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; flex-shrink: 0;
}
.modal-close:hover { background: var(--sand-dim); color: var(--sand); border-color: var(--sand); transform: rotate(90deg); }
.modal-close svg { width: 16px; height: 16px; }
.modal-body { padding: 24px 32px 32px; }
.modal-footer-btn {
  width: 100%; padding: 14px; border-radius: 100px; border: none;
  background: linear-gradient(135deg, var(--sand), #c49360);
  color: var(--night); font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: var(--shadow-gold);
}
.modal-footer-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,165,116,0.35); }

.toasts { position: fixed; bottom: 24px; right: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--surface); border: 1px solid rgba(212,165,116,0.15); border-radius: var(--radius-sm);
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow); min-width: 300px; animation: slideUp 0.4s var(--ease);
  backdrop-filter: blur(10px);
}
.toast.ok { border-color: rgba(90,158,140,0.4); }
.toast.err { border-color: rgba(231,76,60,0.4); }
.toast svg { width: 20px; height: 20px; flex-shrink: 0; }
.toast.ok svg { color: var(--mint); }
.toast.err svg { color: #e74c3c; }
.toast-msg { font-size: 14px; font-weight: 500; }
@keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

.hide { display: none !important; }
.page { display: none; animation: fadeIn 0.5s var(--ease); }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="ambient"></div>

<header class="header">
  <div class="header-inner">
    <a class="brand" onclick="go('home')">
      <div class="brand-mark">📽️</div>
      <div class="brand-text"><span class="brand-title">SimbaDM</span><span class="brand-sub">Кинематограф</span></div>
    </a>
    <nav class="nav" id="mainNav">
      <button class="nav-btn active" onclick="go('home')" data-page="home">Главная</button>
      <button class="nav-btn" onclick="go('catalog')" data-page="catalog">Каталог</button>
      <button class="nav-btn hide" onclick="go('admin')" data-page="admin" id="navAdmin">Управление</button>
    </nav>
    <div class="actions">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Найти фильм..." id="searchInput" onkeydown="if(event.key==='Enter') doSearch(this.value)">
      </div>
      <div id="authArea">
        <button class="btn btn-ghost" onclick="openModal('login')">Вход</button>
        <button class="btn btn-gold" onclick="openModal('register')">Регистрация</button>
      </div>
      <div id="userArea" class="hide">
        <div class="avatar" id="userAva" onclick="go('profile')">?</div>
      </div>
    </div>
  </div>
</header>

<main class="main">
<div class="app">

<div class="page active" id="p-home">
  <section class="section">
    <h1>Добро пожаловать в SimbaDM</h1>
    <p>Коллекция фильмов и сериалов для вашего развлечения</p>
    <button class="btn btn-gold" onclick="go('catalog')" style="margin-top: 20px;">Перейти в каталог</button>
  </section>
</div>

<div class="page" id="p-catalog">
  <section class="section">
    <h2>Каталог фильмов</h2>
    <div class="grid" id="catalogGrid"></div>
  </section>
</div>

<div class="page" id="p-movie">
  <section class="section">
    <h2 id="dTitle"></h2>
    <video id="movieVideo" controls style="width: 100%; max-width: 800px; border-radius: 16px; margin: 20px 0;"></video>
    <p id="dDesc"></p>
    <div id="dMeta"></div>
  </section>
</div>

<div class="page" id="p-admin">
  <section class="section">
    <h2>Администратор</h2>
    <div class="aform">
      <div class="aform-group">
        <label>Название фильма</label>
        <input type="text" id="addTitle" placeholder="Название">
      </div>
      <div class="aform-group">
        <label>Описание</label>
        <textarea id="addDesc" placeholder="Описание"></textarea>
      </div>
      <div class="aform-group">
        <label>Загрузить видео</label>
        <input type="file" id="addVideo" accept="video/*">
        <small id="videoFileName"></small>
      </div>
      <div class="aform-group">
        <label>Загрузить постер</label>
        <input type="file" id="addPoster" accept="image/*">
        <small id="posterFileName"></small>
      </div>
      <button class="btn btn-gold" onclick="addMovie()">Добавить фильм</button>
    </div>
  </section>
</div>

</div>
</main>

<div id="toasts" class="toasts"></div>

<script>
const Storage = {
  get: (key) => JSON.parse(localStorage.getItem(key) || 'null'),
  set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
};

let user = null;
let currentMovie = null;
let currentPage = 'home';

function go(page, params={}) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('p-' + page).classList.add('active');
  
  const navBtns = document.querySelectorAll('.nav-btn');
  navBtns.forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`[data-page="${page}"]`);
  if(activeBtn) activeBtn.classList.add('active');
  
  currentPage = page;
  
  if(page === 'catalog') renderCatalog();
  if(page === 'movie' && params.id) renderMovie(params.id);
  if(page === 'admin') checkAdmin();
}

function renderCatalog() {
  const movies = Storage.get('movies') || [];
  const grid = document.getElementById('catalogGrid');
  
  if(movies.length === 0) {
    grid.innerHTML = '<p>Нет фильмов в каталоге</p>';
    return;
  }
  
  grid.innerHTML = movies.map(m => `
    <div class="card" onclick="go('movie', {id: ${m.id}})">
      <div class="card-img">
        ${m.poster ? `<img src="${m.poster}" alt="${m.title}">` : '<div style="width:100%; height:100%; background: var(--deep); display:flex; align-items:center; justify-content:center;">📽️</div>'}
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">
          <span>${m.type === 'series' ? '📺' : '🎬'}</span>
          <span>${m.type === 'series' ? 'Сериал' : 'Фильм'}</span>
          ${m.episodes ? `<span>•</span><span>${m.episodes} серий</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function renderMovie(id) {
  const movies = Storage.get('movies') || [];
  const movie = movies.find(m => m.id === id);
  
  if(!movie) return go('catalog');
  
  currentMovie = movie;
  
  document.getElementById('dTitle').textContent = movie.title;
  document.getElementById('dDesc').textContent = movie.description || '';
  document.getElementById('dMeta').innerHTML = `
    <p><strong>Тип:</strong> ${movie.type === 'series' ? 'Сериал' : 'Фильм'}</p>
    ${movie.episodes ? `<p><strong>Серий:</strong> ${movie.episodes}</p>` : ''}
    ${movie.year ? `<p><strong>Год:</strong> ${movie.year}</p>` : ''}
  `;
  
  const video = document.getElementById('movieVideo');
  if(movie.video) {
    video.src = movie.video;
    video.style.display = 'block';
  } else {
    video.style.display = 'none';
  }
}

function addMovie() {
  const title = document.getElementById('addTitle').value.trim();
  const desc = document.getElementById('addDesc').value.trim();
  const videoFile = document.getElementById('addVideo').files[0];
  const posterFile = document.getElementById('addPoster').files[0];
  
  if(!title) {
    toast('Введите название фильма', 'err');
    return;
  }
  
  const movies = Storage.get('movies') || [];
  const newId = Math.max(...movies.map(m => m.id), 0) + 1;
  
  const newMovie = {
    id: newId,
    title,
    description: desc,
    type: 'movie',
    video: null,
    poster: null
  };
  
  let pending = 0;
  if(videoFile) {
    pending++;
    const reader = new FileReader();
    reader.onload = (e) => {
      newMovie.video = e.target.result;
      if(--pending === 0) saveMovie();
    };
    reader.readAsDataURL(videoFile);
  }
  
  if(posterFile) {
    pending++;
    const reader = new FileReader();
    reader.onload = (e) => {
      newMovie.poster = e.target.result;
      if(--pending === 0) saveMovie();
    };
    reader.readAsDataURL(posterFile);
  }
  
  function saveMovie() {
    const movies = Storage.get('movies') || [];
    movies.push(newMovie);
    Storage.set('movies', movies);
    
    document.getElementById('addTitle').value = '';
    document.getElementById('addDesc').value = '';
    document.getElementById('addVideo').value = '';
    document.getElementById('addPoster').value = '';
    document.getElementById('videoFileName').textContent = '';
    document.getElementById('posterFileName').textContent = '';
    
    toast('Фильм добавлен успешно!', 'ok');
    renderCatalog();
  }
  
  if(pending === 0) saveMovie();
}

document.getElementById('addVideo')?.addEventListener('change', (e) => {
  document.getElementById('videoFileName').textContent = e.target.files[0]?.name || '';
});

document.getElementById('addPoster')?.addEventListener('change', (e) => {
  document.getElementById('posterFileName').textContent = e.target.files[0]?.name || '';
});

function checkAdmin() {
  if(!user || user.role !== 'admin') {
    toast('Доступ запрещен', 'err');
    return go('home');
  }
}

function openModal(type) {
  if(type === 'login') {
    const name = prompt('Ваше имя:');
    if(name) {
      user = { id: Date.now(), name, role: 'user' };
      Storage.set('currentUser', user);
      updateAuthUI();
      toast('Добро пожаловать, ' + name, 'ok');
    }
  }
}

function updateAuthUI() {
  const authArea = document.getElementById('authArea');
  const userArea = document.getElementById('userArea');
  const navAdmin = document.getElementById('navAdmin');
  
  if(user) {
    authArea.classList.add('hide');
    userArea.classList.remove('hide');
    document.getElementById('userAva').textContent = user.name[0].toUpperCase();
    
    if(user.role === 'admin') {
      navAdmin.classList.remove('hide');
    }
  } else {
    authArea.classList.remove('hide');
    userArea.classList.add('hide');
    navAdmin.classList.add('hide');
  }
}

function toast(msg, type='ok') {
  const toasts = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `
    <svg viewBox="0 0 24 24" fill="currentColor">${type === 'ok' ? '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>' : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'}</svg>
    <div class="toast-msg">${msg}</div>
  `;
  toasts.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function doSearch(query) {
  const movies = Storage.get('movies') || [];
  const results = movies.filter(m => m.title.toLowerCase().includes(query.toLowerCase()));
  
  if(results.length > 0) {
    go('movie', {id: results[0].id});
  } else {
    toast('Фильм не найден', 'err');
  }
}

window.addEventListener('load', () => {
  user = Storage.get('currentUser');
  updateAuthUI();
  renderCatalog();
});

</script>
</body>
</html>
